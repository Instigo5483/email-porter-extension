<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Porter</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">

    <!-- ── Main view ── -->
    <div id="mainView" class="view active">
      <header>
        <span class="logo">Email Porter</span>
      </header>

      <section class="settings">
        <label class="toggle-row" for="hideHeadersToggle">
          <span class="toggle-label">Hide Sender &amp; Recipient</span>
          <div class="toggle-wrap">
            <input type="checkbox" id="hideHeadersToggle" />
            <span class="slider"></span>
          </div>
        </label>
      </section>

      <section class="actions">
        <button id="discordBtn" class="btn btn-discord">
          <svg width="20" height="20" viewBox="0 0 127.14 96.36" fill="currentColor" aria-hidden="true">
            <path d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0a105.89 105.89 0 0 0-26.25 8.09C2.79 32.65-1.71 56.6.54 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.34 2.66-2a75.57 75.57 0 0 0 64.32 0c.87.71 1.76 1.39 2.66 2a68.68 68.68 0 0 1-10.87 5.19 77 77 0 0 0 6.89 11.1 105.25 105.25 0 0 0 32.19-16.14c2.64-27.38-4.51-51.11-18.9-72.15zM42.45 65.69C36.18 65.69 31 60 31 53s5-12.74 11.43-12.74S54 46 53.89 53s-5.05 12.69-11.44 12.69zm42.24 0C78.41 65.69 73.25 60 73.25 53s5-12.74 11.44-12.74S96.23 46 96.12 53s-5.04 12.69-11.43 12.69z"/>
          </svg>
          Share to Discord
        </button>

        <button id="whatsappBtn" class="btn btn-whatsapp">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
          </svg>
          Share to WhatsApp
        </button>
      </section>

      <div id="status" class="status" aria-live="polite"></div>
    </div>

    <!-- ── Email chooser view ── -->
    <div id="emailChooserView" class="view">
      <div class="view-header">
        <button id="chooserBack" class="back-btn">←</button>
        <span class="view-title">Choose an Email</span>
      </div>
      <div id="emailList" class="picker-list"></div>
    </div>

    <!-- ── Discord picker view ── -->
    <div id="discordPickerView" class="view">

      <!-- Not logged in -->
      <div id="dcLoginScreen" class="dc-screen">
        <div class="view-header">
          <button id="dcLoginBack" class="back-btn">←</button>
          <span class="view-title">Discord</span>
        </div>
        <div class="login-box">
          <p>Open Discord in this browser and log in, then click Retry.</p>
          <a id="dcLoginLink" href="https://discord.com/login" target="_blank" class="login-link">
            Open Discord Web
          </a>
          <button id="dcRetryBtn" class="btn btn-discord" style="margin-top:10px">
            Retry
          </button>
        </div>
      </div>

      <!-- Server list -->
      <div id="dcServerScreen" class="dc-screen">
        <div class="view-header">
          <button id="dcServerBack" class="back-btn">←</button>
          <span class="view-title">Choose a Server</span>
        </div>
        <div id="serverList" class="picker-list"></div>
        <div id="dcServerStatus" class="status"></div>
      </div>

      <!-- Channel list -->
      <div id="dcChannelScreen" class="dc-screen">
        <div class="view-header">
          <button id="dcChannelBack" class="back-btn">←</button>
          <span id="dcChannelTitle" class="view-title">Choose a Channel</span>
        </div>
        <div id="channelList" class="picker-list"></div>
        <div id="dcChannelStatus" class="status"></div>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
